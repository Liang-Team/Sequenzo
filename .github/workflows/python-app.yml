          except ImportError as e:
              print(f'✗ Failed to import sequenzo: {e}')
              # 打印详细的错误信息
              import traceback
              traceback.print_exc()
          except Exception as e:
              print(f'✗ Error during import: {e}')
              import traceback
              traceback.print_exc()
          "
          
          # 如果导入成功，运行集成测试
          echo "=== Running integration tests ==="
          if python -c "import sequenzo" 2>/dev/null; then
              echo "Sequenzo imported successfully, running integration tests..."
              
              # 安装 pytest 如果尚未安装
              pip install pytest || echo "pytest installation failed, but continuing..."
              
              # 检查测试文件是否存在
              if [ -f "tests/test_quickstart_integration.py" ]; then
                  pytest tests/test_quickstart_integration.py -v -s || echo "Integration tests completed with warnings"
              else
                  echo "Test file not found"
              fi
          else
              echo "ERROR: Cannot import sequenzo, skipping integration tests"
              # 退出并显示错误
              exit 1
          fi
        shell: bash

      - name: Set up Miniconda for Windows wheel smoke
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: sequenzo-wheel-smoke
          auto-update-conda: true

      - name: Windows Conda wheel smoke test
        if: runner.os == 'Windows'
        shell: bash -el {0}
        run: |
          echo "=== Windows Conda wheel smoke test ==="
          conda info
          python -m pip install --upgrade pip
          PY_TAG="cp${{ matrix.python-version-nodot }}"
          WHEEL=$(python - <<PY
          import glob
          import sys
          wheels = glob.glob("dist/*${PY_TAG}*win_amd64.whl")
          if not wheels:
              raise SystemExit("No Windows wheel found for ${PY_TAG}")
          print(wheels[0])
          PY
          )
          echo "Installing $WHEEL into Conda environment"
          python -m pip install --force-reinstall "$WHEEL"
          python - <<'PY'
          import importlib.util
          import os
          import sys

          # Avoid importing the checkout's source tree (no compiled .pyd/.so there).
          sys.path = [p for p in sys.path if p]

          import numpy as np

          print("CONDA_PREFIX=" + os.environ.get("CONDA_PREFIX", ""))

          from sequenzo import SequenceData, get_distance_matrix, Cluster
          import sequenzo.utils.core_distance_operations.core_distance_c_code as core_distance_c_code
          from sequenzo.utils.core_distance_operations import weighted_inertia_contrib

          spec = importlib.util.find_spec(
              "sequenzo.utils.core_distance_operations.core_distance_c_code"
          )
          if spec is None or not spec.origin:
              raise SystemExit(
                  "core_distance_c_code not found after wheel install; "
                  f"sys.path={sys.path!r}"
              )
          print(f"[OK] core_distance_c_code loaded from: {spec.origin}")

          contrib = weighted_inertia_contrib(
              np.array([[0.0, 1.0], [1.0, 0.0]], dtype=np.float64),
              np.array([0, 1], dtype=np.int32),
              np.array([1.0, 1.0], dtype=np.float64),
          )
          assert contrib.shape == (2,)
          print("[OK] Windows Conda wheel smoke test passed")
          PY

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/
